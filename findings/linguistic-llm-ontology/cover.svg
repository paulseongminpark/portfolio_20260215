<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <rect width="400" height="560" fill="#ffffff"/>

  <!-- top rule -->
  <rect x="0" y="0" width="400" height="2.5" fill="#111"/>

  <!-- eyebrow -->
  <text x="36" y="52" font-family="Inter, Arial, sans-serif" font-size="10"
    font-weight="600" letter-spacing="3" fill="#aaa">ESSAY · 2026</text>

  <!-- thin divider -->
  <line x1="36" y1="64" x2="364" y2="64" stroke="#e0e0e0" stroke-width="0.6"/>

  <!-- main title -->
  <text x="36" y="138" font-family="Inter, Arial, sans-serif" font-size="32"
    font-weight="800" letter-spacing="-1" fill="#111">LINGUISTIC</text>
  <text x="36" y="178" font-family="Inter, Arial, sans-serif" font-size="32"
    font-weight="800" letter-spacing="-1" fill="#111">— LLM —</text>
  <text x="36" y="218" font-family="Inter, Arial, sans-serif" font-size="32"
    font-weight="800" letter-spacing="-1" fill="#111">ONTOLOGY</text>

  <!-- ko subtitle -->
  <text x="36" y="266" font-family="Noto Sans KR, sans-serif" font-size="13"
    font-weight="400" fill="#444">언어와 구조의 계보</text>

  <!-- description -->
  <text x="36" y="304" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#888">언어를 다루는 모델은 왜 결국</text>
  <text x="36" y="320" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#888">구조를 요구하는가</text>

  <!-- tags -->
  <text x="36" y="390" font-family="Inter, Arial, sans-serif" font-size="9"
    letter-spacing="1.5" fill="#bbb">언어학 · 토큰화 · 임베딩</text>
  <text x="36" y="406" font-family="Inter, Arial, sans-serif" font-size="9"
    letter-spacing="1.5" fill="#bbb">Attention · 온톨로지</text>

  <!-- bottom rule -->
  <line x1="36" y1="494" x2="364" y2="494" stroke="#e0e0e0" stroke-width="0.6"/>

  <!-- footer -->
  <text x="36" y="520" font-family="Inter, Arial, sans-serif" font-size="10"
    letter-spacing="2" fill="#aaa">2026</text>
  <text x="364" y="520" font-family="Inter, Arial, sans-serif" font-size="10"
    letter-spacing="1" fill="#aaa" text-anchor="end">22 PAGES</text>
