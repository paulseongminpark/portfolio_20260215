<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Orchestration Graph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #ffffff;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden;
  color: #444460;
}

#canvas { width:100vw; height:100vh; }

/* ── 상단 타이틀 ── */
#header {
  position: fixed; top: 28px; left: 50%;
  transform: translateX(-50%);
  text-align: center; pointer-events: none;
}
#header h1 {
  font-size: 13px; font-weight: 500;
  color: rgba(0,0,0,0.3);
  letter-spacing: 0.12em; text-transform: uppercase;
}

/* ── 필터 (하단 중앙, 미니멀) ── */
#filters {
  position: fixed; bottom: 12px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 5px;
  background: rgba(0,0,0,0.04);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 24px; padding: 5px 8px;
  backdrop-filter: blur(12px);
}
.fb {
  background: transparent; border: none;
  color: rgba(0,0,0,0.3); padding: 4px 12px;
  border-radius: 18px; cursor: pointer;
  font-size: 11px; font-family: inherit; font-weight: 400;
  transition: all 0.2s; white-space: nowrap;
}
.fb:hover { color: rgba(0,0,0,0.65); }
.fb.on {
  background: rgba(0,0,0,0.07);
  color: rgba(0,0,0,0.85);
}

/* ── 범례 (좌하단, 매우 작게) ── */
#legend {
  position: fixed; bottom: 72px; left: 28px;
  font-size: 10px;
}
.lr {
  display: flex; align-items: center;
  gap: 7px; margin: 4px 0;
  color: rgba(0,0,0,0.35);
}
.ld {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0;
}

/* ── 툴팁 ── */
#tip {
  position: fixed; top: 50%; right: 32px;
  transform: translateY(-50%);
  background: #ffffff;
  border: 1px solid rgba(0,0,0,0.14);
  border-radius: 14px; padding: 20px 22px;
  font-size: 12px; width: 240px;
  display: none; pointer-events: none;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18), 0 1px 4px rgba(0,0,0,0.08);
}
.tt {
  font-size: 13px; font-weight: 600;
  color: #1a1a2e; margin-bottom: 12px;
  line-height: 1.4;
}
.trow {
  display: flex; justify-content: space-between;
  margin: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.05);
  padding-bottom: 6px;
}
.trow:last-child { border-bottom: none; padding-bottom: 0; }
.tk { color: rgba(0,0,0,0.3); font-size: 11px; }
.tv { color: rgba(0,0,0,0.7); font-size: 11px; font-weight: 500; }
.tdesc {
  margin-top: 10px; font-size: 11px;
  color: rgba(0,0,0,0.4); line-height: 1.6;
}
.tbadge {
  display: inline-block; padding: 3px 9px;
  border-radius: 20px; font-size: 10px;
  margin-top: 10px; font-weight: 500;
}

/* ── Export 버튼 ── */
#export-btn {
  position: fixed; bottom: 12px; right: 28px;
  background: transparent; border: 1px solid rgba(0,0,0,0.12);
  color: rgba(0,0,0,0.3); padding: 5px 13px;
  border-radius: 18px; cursor: pointer;
  font-size: 11px; font-family: inherit;
  transition: all 0.2s;
}
#export-btn:hover { color: rgba(0,0,0,0.7); border-color: rgba(0,0,0,0.25); }
#export-toast {
  position: fixed; bottom: 48px; right: 28px;
  background: rgba(0,0,0,0.75); color: #fff;
  font-size: 11px; padding: 6px 14px; border-radius: 10px;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}

/* ── 에이전트 카운터 (우상단) ── */
#counter {
  position: fixed; top: 28px; right: 28px;
  font-size: 11px; color: rgba(0,0,0,0.25);
  text-align: right; line-height: 1.8;
}
.cnt-v { color: rgba(0,0,0,0.6); font-weight: 500; font-size: 18px; }

/* top-bar: invisible wrapper on desktop */
#top-bar { display: contents; }

/* ── Mobile responsive ── */
@media (max-width: 500px) {
  /* Top bar: centered flex row */
  #top-bar {
    display: flex; justify-content: center; align-items: baseline;
    gap: 12px;
    position: fixed; top: 0px; left: 0; right: 0;
    z-index: 10; pointer-events: none;
  }
  #header {
    position: static; transform: none; text-align: center;
  }
  #header h1 {
    font-size: 10px; letter-spacing: 0.06em;
    white-space: nowrap; color: rgba(0,0,0,0.5);
    line-height: 16px;
  }
  #counter {
    position: static;
    display: flex; gap: 8px; align-items: baseline;
    line-height: 16px;
  }
  #counter > div { display: inline; font-size: 8px; }
  .cnt-v { font-size: 12px; }

  /* Legend → single horizontal row */
  #legend {
    bottom: 24px; left: 0; right: 0;
    transform: none;
    display: flex; flex-wrap: nowrap;
    gap: 1px 6px; justify-content: center;
    font-size: 7px;
  }
  .lr { margin: 0; gap: 2px; }
  .ld { width: 4px; height: 4px; }

  /* Filters → full width */
  #filters {
    bottom: 2px;
    width: calc(100% - 8px);
    justify-content: center;
    padding: 2px 4px; gap: 1px;
  }
  .fb { padding: 2px 6px; font-size: 8px; }

  /* Hide tooltip + export on mobile */
  #tip { display: none !important; }
  #export-btn { display: none; }
  #export-toast { display: none; }
}

/* ── Landscape expanded (wide but short — iframe in rotated fullscreen) ── */
@media (min-width: 501px) and (max-height: 500px) {
  #top-bar {
    display: flex; justify-content: center; align-items: baseline;
    gap: 16px;
    position: fixed; top: 1px; left: 0; right: 0;
    z-index: 10; pointer-events: none;
  }
  #header {
    position: static; transform: none; text-align: center;
  }
  #header h1 {
    font-size: 11px; white-space: nowrap;
    color: rgba(0,0,0,0.5); line-height: 16px;
    letter-spacing: 0.06em;
  }
  #counter {
    position: static;
    display: flex; gap: 10px; align-items: baseline;
    line-height: 16px;
  }
  #counter > div { display: inline; font-size: 9px; }
  .cnt-v { font-size: 13px; }

  #legend {
    bottom: 32px; left: 50%; right: auto;
    transform: translateX(-50%);
    display: flex; flex-wrap: nowrap;
    gap: 1px 10px; justify-content: center;
    width: calc(100% - 16px);
    font-size: 8px;
  }
  .lr { margin: 0; gap: 3px; }
  .ld { width: 5px; height: 5px; }

  #filters {
    bottom: 4px;
    width: auto;
    padding: 3px 8px; gap: 2px;
  }
  .fb { padding: 2px 8px; font-size: 9px; }

  #tip { display: none !important; }
  #export-btn { display: none; }
}
</style>
</head>
<body>

<svg id="canvas"></svg>

<div id="top-bar">
  <div id="header">
    <h1>Orchestration Evolution · v0 → v4</h1>
  </div>
  <div id="counter">
    <div><span class="cnt-v" id="cnt-agents">—</span> agents</div>
    <div><span class="cnt-v" id="cnt-concepts">—</span> concepts</div>
  </div>
</div>

<div id="legend">
  <div class="lr"><div class="ld" style="background:#8888cc;box-shadow:0 0 6px #8888cc55"></div>version</div>
  <div class="lr"><div class="ld" style="background:#6b9fd4"></div>agent / team</div>
  <div class="lr"><div class="ld" style="background:#c4935f"></div>hook / automation</div>
  <div class="lr"><div class="ld" style="background:#5fac80"></div>skill</div>
  <div class="lr"><div class="ld" style="background:#a87fd4"></div>CLI / integration</div>
  <div class="lr"><div class="ld" style="background:#c4b060"></div>memory / context</div>

</div>

<div id="filters">

  <button class="fb" data-f="agent">Agent</button>
  <button class="fb" data-f="hook">Hook</button>

  <button class="fb" data-f="memory">Memory</button>

</div>

<div id="tip"></div>

<div id="export-toast">Copied to clipboard</div>


<script src="https://d3js.org/d3.v7.min.js"></script>
<script>

  { id:'c_team_exp', label:'Team Experiment',   cat:'agent',     ver:'v3.0',   desc:'CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS 초기 실험' },
  { id:'c_rhizome',  label:'Rhizome Teams',     cat:'agent',     ver:'v3.2',   desc:'분산형 팀 구조 도입, 에이전트 24개로 확장' },
  { id:'c_sot',      label:'SoT 확립',          cat:'memory',    ver:'v3.2',   desc:'STATE.md를 Source of Truth로 확립, Living Docs 체계화' },
  { id:'c_skills11', label:'Skills →11',        cat:'skill',     ver:'v3.2',   desc:'17→11: 불필요 스킬 제거, 핵심만 유지' },
  { id:'c_linker',   label:'Linker System',     cat:'agent',     ver:'v3.1',   desc:'context-linker(realtime) + project-linker(cross)' },
  { id:'c_live',     label:'live-context.md',   cat:'memory',    ver:'v3.1',   desc:'PostToolUse → 0-token realtime cross-session share' },
  { id:'c_metaorch', label:'meta-orchestrator', cat:'agent',     ver:'v3.1',   desc:'session state analysis → team dispatch [Opus]' },

  { id:'c_claude_only',label:'Claude=설계권자',  cat:'principle', ver:'v4',     desc:'Claude only — design/decision/write. External CLI = extract only' },
  { id:'c_merge',    label:'agent merge →15',   cat:'agent',     ver:'v4',     desc:'24→15: deleted 4 + merged 5 + memory:user 3' },
  { id:'c_skillmin', label:'skills →9',         cat:'skill',     ver:'v4',     desc:'14→9: disable-model-invocation, ~8K saved' },
  { id:'c_rulesync', label:'rulesync',          cat:'cli',       ver:'v4',     desc:'.rulesync/rules/ SoT → all CLI auto sync' },
  { id:'c_ctx',      label:'.ctx/ Cross-CLI',   cat:'memory',    ver:'v4',     desc:'shared-context.md + provenance.log all CLI share' },
  { id:'c_memuser',  label:'memory:user',        cat:'memory',    ver:'v4',     desc:'persistent user memory — code-reviewer·compressor·meta-orch' },
  { id:'c_wt',       label:'Worktree + /handoff',cat:'cli',      ver:'v4',     desc:'isolated env + CLI-to-CLI handoff skill' },
  { id:'c_taskcomp', label:'TaskCompleted hook', cat:'hook',      ver:'v4',     desc:'.ctx/shared-context.md auto-update + provenance.log record' },
  { id:'c_notify',   label:'Notification hook',  cat:'hook',      ver:'v4',     desc:'system notifications — PostCompact replaced by this' },

  // ── 서브에이전트 (개별) ─────────────────────────────────────────────────

  { id:'sa_metaorch',      label:'meta-orchestrator',cat:'agent',ver:'v3.1', desc:'[Opus] dispatch hub — /dispatch → team activation' },
  { id:'sa_orch_state',    label:'orch-state',       cat:'agent', ver:'v4',  desc:'[Sonnet] session state → next 3 actions (cross-team util)' },

const VER_EDGES = [
  {s:'v1',t:'v2'},{s:'v2',t:'v2.1'},
  {s:'v2.1',t:'v2.2'},{s:'v2.2',t:'v3.0'},{s:'v3.0',t:'v3.1'},
  {s:'v3.1',t:'v3.2'},{s:'v3.2',t:'v3.3'},
  {s:'v3.3',t:'v3.3.1'},{s:'v3.3.1',t:'v4'}
];

// 개념 간 진화 관계
const CON_EDGES = [
  {s:'c_scripts',  t:'c_overhaul'},
  {s:'c_memory',   t:'c_live'},
  {s:'c_live',     t:'c_ctx'},
  {s:'c_a14',      t:'c_merge'},
  {s:'c_prune',    t:'c_merge'},
  {s:'c_prune',    t:'c_skillmin'},
  {s:'c_gemini',   t:'c_verify'},
  {s:'c_codex',    t:'c_verify'},
  {s:'c_verify',   t:'c_cur'},
  {s:'c_chain',    t:'c_200k'},
  {s:'c_flat',     t:'c_200k'},
  {s:'c_wt',       t:'c_ctx'},
  {s:'c_rulesync', t:'c_ctx'},
  {s:'sa_morning',  t:'sa_daily_ops'},
  {s:'sa_aisynth',  t:'c_verify'},
  {s:'c_a14',       t:'sa_code_rev'},
  {s:'c_a14',       t:'sa_commit'},
  {s:'c_a14',       t:'sa_compress'},
  {s:'c_a14',       t:'sa_morning'},
  {s:'c_merge',     t:'sa_pf_ops'},
  {s:'c_merge',     t:'sa_doc_ops'},
  {s:'c_merge',     t:'sa_daily_ops'},
  {s:'c_merge',     t:'sa_tr_ops'},
  {s:'c_linker',    t:'sa_linker'},
  {s:'c_metaorch',  t:'sa_metaorch'},
  {s:'c_merge',     t:'sa_orch_state'},
  {s:'c_merge',     t:'sa_project_ctx'},
  {s:'c_chain',     t:'c_1session'},
  {s:'c_200k',      t:'c_1session'},
  {s:'c_cur',       t:'c_claude_only'},
  {s:'c_ctx',       t:'c_taskcomp'},
  {s:'c_merge',     t:'c_memuser'},
  {s:'c_ctx',       t:'c_memuser'},
];

// ── 그래프 빌드 ──────────────────────────────────────────────────────────────
function buildGraph(cf) {
  const cons = cf==='all' ? CONCEPTS
    : Array.isArray(cf) ? CONCEPTS.filter(c=>cf.includes(c.cat))
    : CONCEPTS.filter(c=>c.cat===cf);
  const conIds = new Set(cons.map(c=>c.id));
  const nodes = [
    ...VERSIONS.map(v=>({...v, kind:'version'})),
    ...cons.map(c=>({...c, kind:'concept', color:CAT_COLOR[c.cat]}))
  ];
  const links = [
    ...VER_EDGES.map(e=>({source:e.s, target:e.t, type:'ver'})),
    ...cons.map(c=>({source:c.ver, target:c.id, type:'con', cat:c.cat})),
    ...CON_EDGES.filter(e=>conIds.has(e.s)&&conIds.has(e.t))
               .map(e=>({source:e.s, target:e.t, type:'cc'}))
  ];
  return {nodes, links};
}

// ── SVG ──────────────────────────────────────────────────────────────────────
const svg = d3.select('#canvas');
let W=innerWidth, H=innerHeight;
svg.attr('width',W).attr('height',H);

// 글로우 필터
const defs = svg.append('defs');
['ver','con'].forEach((id,i) => {
  const f = defs.append('filter').attr('id','glow-'+id)
    .attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
  f.append('feGaussianBlur').attr('stdDeviation', i===0?'6':'3').attr('result','b');
  const m = f.append('feMerge');
  m.append('feMergeNode').attr('in','b');
  m.append('feMergeNode').attr('in','SourceGraphic');
});

const gMain = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.08,8])
  .on('zoom', e=>gMain.attr('transform',e.transform));
svg.call(zoom)
  .on('wheel.zoom', null)
  .on('mousedown.zoom', null)
  .on('dblclick.zoom', null)
  .on('touchstart.zoom', null)
  .on('touchmove.zoom', null)
  .on('touchend.zoom', null);

const agentMax = Math.max(...VERSIONS.map(v=>v.agents));

let sim, lv, lc, lcc, ns, curF='all';
let currentNodes = null;
let pinnedNode = null;

// 저장된 초기 위치

function render(f) {
  gMain.selectAll('*').remove();
  const {nodes, links} = buildGraph(f);

  if(Object.keys(SAVED_POSITIONS).length > 0) {
    nodes.forEach(n => {
      if(SAVED_POSITIONS[n.id]) {
        n.x = SAVED_POSITIONS[n.id].x;
        n.y = SAVED_POSITIONS[n.id].y;
        n.fx = SAVED_POSITIONS[n.id].fx ?? null;
        n.fy = SAVED_POSITIONS[n.id].fy ?? null;
      }
    });
  }

  currentNodes = nodes;

  const latestVer = nodes.filter(n=>n.kind==='version').slice(-1)[0];
  document.getElementById('cnt-agents').textContent = latestVer ? latestVer.agents : '—';
  document.getElementById('cnt-concepts').textContent =
    nodes.filter(n=>n.kind==='concept').length;

  if(sim) sim.stop();

  sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id)
      .distance(d=>d.type==='ver'?140:75)
      .strength(d=>d.type==='ver'?0.9:0.3))
    .force('charge', d3.forceManyBody()
      .strength(d=>d.kind==='version'?-300:-65))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('x', d3.forceX(d=>{
      if(d.kind!=='version') return W/2;
      const i = VERSIONS.findIndex(v=>v.id===d.id);
      return W*0.12 + i*(W*0.76)/(VERSIONS.length-1);
    }).strength(d=>d.kind==='version'?0.04:0))
    .force('collision', d3.forceCollide()
      .radius(d=>d.kind==='version'?40:14));

  // ── 엣지 ────────────────────────────────────────────────────────────────
  lv = gMain.append('g').selectAll('line')
    .data(links.filter(l=>l.type==='ver')).join('line')
    .attr('stroke','rgba(0,0,0,0.13)')
    .attr('stroke-width', 1.5);

  lc = gMain.append('g').selectAll('line')
    .data(links.filter(l=>l.type==='con')).join('line')
    .attr('stroke', d=>CAT_COLOR[d.cat])
    .attr('stroke-opacity', 0.4)
    .attr('stroke-width', 1.2);

  lcc = gMain.append('g').selectAll('line')
    .data(links.filter(l=>l.type==='cc')).join('line')
    .attr('stroke','rgba(0,0,0,0.22)')
    .attr('stroke-width', 1)
    .attr('stroke-dasharray','3,3')
    .attr('stroke-opacity', 0.55);

  // ── 노드 ────────────────────────────────────────────────────────────────
  ns = gMain.append('g').selectAll('.nd')
    .data(nodes).join('g').attr('class','nd')
    .style('cursor','pointer')
    .call(d3.drag()
      .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on('end',  (e,d)=>{ if(!e.active) sim.alphaTarget(0); })
    )
    .on('mouseover', (e,d)=>{ if(!pinnedNode) onHover(e,d); })
    .on('mouseout',  ()=>{ if(!pinnedNode) onOut(); })
    .on('click',(e,d)=>{
      e.stopPropagation();
      if(pinnedNode === d) { pinnedNode = null; onOut(); }
      else { pinnedNode = d; onHover(e,d); }
    });

  const verNodes = ns.filter(d=>d.kind==='version');

  verNodes.append('circle')
    .attr('r', d=>{ const b=22; const x=d.agents>0?(d.agents/agentMax)*14:0; return b+x+10; })
    .attr('fill','none')
    .attr('stroke','#8888cc')
    .attr('stroke-width',0.8)
    .attr('stroke-opacity', d=>d.id==='v4'?0.55:0.25)
    .style('filter','url(#glow-ver)');

  verNodes.append('circle')
    .attr('r', d=>{ const b=22; const x=d.agents>0?(d.agents/agentMax)*14:0; return b+x; })
    .attr('fill','#8888cc')
    .attr('fill-opacity', d=>d.id==='v4'?0.38:0.22)
    .attr('stroke','#8888cc')
    .attr('stroke-width', d=>d.id==='v4'?2:1.5)
    .attr('stroke-opacity', d=>d.id==='v4'?0.95:0.7)
    .style('filter','url(#glow-ver)');

  verNodes.append('text')
    .text(d=>d.label)
    .attr('text-anchor','middle').attr('y',-3)
    .attr('font-size',12).attr('font-weight','600')
    .attr('font-family','Inter,-apple-system,sans-serif')
    .attr('fill','rgba(0,0,0,0.75)')
    .style('pointer-events','none');

  verNodes.append('text')
    .text(d=>d.agents>0?`${d.agents}A`:'')
    .attr('text-anchor','middle').attr('y',13)
    .attr('font-size',9).attr('font-weight','400')
    .attr('font-family','Inter,-apple-system,sans-serif')
    .attr('fill','rgba(0,0,0,0.35)')
    .style('pointer-events','none');

  const conNodes = ns.filter(d=>d.kind==='concept');

  // Invisible touch target for mobile (bigger hit area)
  conNodes.append('circle')
    .attr('r', 22)
    .attr('fill', 'transparent')
    .attr('stroke', 'none');

  conNodes.append('circle')
    .attr('r', 6)
    .attr('fill', d=>d.color)
    .attr('fill-opacity', 0.32)
    .attr('stroke', d=>d.color)
    .attr('stroke-width', 1.2)
    .attr('stroke-opacity', 0.8)
    .style('filter','url(#glow-con)');

  conNodes.append('text')
    .text(d=>d.label)
    .attr('text-anchor','middle').attr('y',18)
    .attr('font-size',8.5).attr('font-weight','400')
    .attr('font-family','Inter,-apple-system,sans-serif')
    .attr('fill',d=>d.color).attr('fill-opacity',0.75)
    .style('pointer-events','none');

  sim.on('tick',()=>{
    lv.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
      .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    lc.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
      .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    lcc.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
       .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    ns.attr('transform',d=>`translate(${d.x|0},${d.y|0})`);
  });
}

// ── 인터랙션 ─────────────────────────────────────────────────────────────────
function myLinks(d) {
  return [...lv.data(),...lc.data(),...lcc.data()].filter(l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return s===d.id||t===d.id;
  });
}

function onHover(e,d) {
  const ml = myLinks(d);
  const conn = new Set([d.id]);
  ml.forEach(l=>{
    conn.add(typeof l.source==='object'?l.source.id:l.source);
    conn.add(typeof l.target==='object'?l.target.id:l.target);
  });

  lv.attr('stroke-opacity', l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return (s===d.id||t===d.id)?0.6:0.04;
  }).attr('stroke-width',l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return (s===d.id||t===d.id)?2:1.5;
  });
  lc.attr('stroke-opacity', l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return (s===d.id||t===d.id)?0.7:0.03;
  });
  lcc.attr('stroke-opacity', l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return (s===d.id||t===d.id)?0.75:0.06;
  }).attr('stroke-width', l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return (s===d.id||t===d.id)?1.5:1;
  });
  ns.selectAll('circle').attr('opacity', function(){
    const nd=d3.select(this.parentNode).datum();
    return conn.has(nd.id)?1:0.08;
  });
  ns.selectAll('text').attr('opacity', function(){
    const nd=d3.select(this.parentNode).datum();
    return conn.has(nd.id)?1:0.08;
  });

  const tip = document.getElementById('tip');
  let html='';
  if(d.kind==='version'){
    const cc = ml.map(l=>typeof l.target==='object'?l.target:null)
                  .filter(n=>n&&n.kind==='concept');
    html=`<div class="tt">${d.label}<br><span style="font-weight:300;color:rgba(0,0,0,0.4);font-size:11px">${d.desc}</span></div>
      <div class="trow"><span class="tk">Date</span><span class="tv">${d.date||'—'}</span></div>
      <div class="trow"><span class="tk">Agents</span><span class="tv">${d.agents}</span></div>
      <div class="trow"><span class="tk">Skills</span><span class="tv">${d.skills}</span></div>
      <div class="trow"><span class="tk">Concepts</span><span class="tv">${cc.length}</span></div>
      <div class="tdesc">${cc.slice(0,4).map(c=>`<span style="color:${CAT_COLOR[c.cat]};margin-right:6px">• ${c.label}</span>`).join('<br>')}</div>`;
  } else {
    const vn = ml.map(l=>typeof l.source==='object'?l.source:null).find(n=>n&&n.kind==='version');
    const col = CAT_COLOR[d.cat];
    html=`<div class="tt">${d.label}</div>
      <div class="trow"><span class="tk">Introduced</span><span class="tv">${vn?vn.label:'—'}</span></div>
      <div class="trow"><span class="tk">Category</span><span class="tv" style="color:${col}">${d.cat}</span></div>
      <div class="tdesc">${d.desc}</div>
      <span class="tbadge" style="background:${col}15;color:${col};border:1px solid ${col}30">${d.cat}</span>`;
  }
  tip.innerHTML=html;
  tip.style.display='block';
}

function onOut(){
  lv.attr('stroke','rgba(0,0,0,0.13)').attr('stroke-width',1.5);
  lc.attr('stroke-opacity',0.4);
  lcc.attr('stroke-opacity',0.55).attr('stroke-width',1);
  ns.selectAll('circle').attr('opacity',1);
  ns.selectAll('text').attr('opacity',1);
  document.getElementById('tip').style.display='none';
}

// ── 필터 (멀티셀렉트 토글) ────────────────────────────────────────────────────
const ALL_CATS = ['agent','hook','skill','cli','memory','principle'];
let activeFilters = new Set(ALL_CATS);

function syncFilterButtons() {
  const allOn = ALL_CATS.every(c=>activeFilters.has(c));
  document.querySelector('[data-f="all"]').classList.toggle('on', allOn);
  ALL_CATS.forEach(c=>{
    document.querySelector(`[data-f="${c}"]`).classList.toggle('on', activeFilters.has(c));
  });
}

document.querySelectorAll('.fb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const f = btn.dataset.f;
    if(f === 'all') {
      activeFilters = new Set(ALL_CATS);
    } else {
      // Exclusive select: show only this category
      activeFilters = new Set([f]);
    }
    syncFilterButtons();
    curF = activeFilters.size === ALL_CATS.length ? 'all' : [...activeFilters];
    render(curF);
  });
});

// ── Export 위치 + zoom transform ────────────────────────────────────────────
function getLayoutData() {
  if(!currentNodes) return null;
  const positions = {};
  currentNodes.forEach(n => {
    positions[n.id] = {
      x: Math.round(n.x),
      y: Math.round(n.y),
      ...(n.fx != null ? {fx: Math.round(n.fx)} : {}),
      ...(n.fy != null ? {fy: Math.round(n.fy)} : {})
    };
  });
  const t = d3.zoomTransform(svg.node());
  const transform = {
    tx: Math.round(t.x * 100) / 100,
    ty: Math.round(t.y * 100) / 100,
    scale: Math.round(t.k * 1000) / 1000
  };
  return { positions, transform };
}

function exportPositions() {
  const data = getLayoutData();
  if(!data) return;
  window._saveLayout && window._saveLayout(data);
}

// ── 저장된 초기 transform (save layout으로 덮어씀) ─────────────────────────
const INITIAL_TRANSFORM = {"tx":-59.15,"ty":-20.82,"scale":0.897};

// ── 초기 뷰포트 fit ──────────────────────────────────────────────────────────
function fitView() {
  const pos = Object.values(SAVED_POSITIONS);
  const xs = pos.map(p => p.x), ys = pos.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  // UI 요소 점유 영역 제외 (header/counter 위, legend/filters 아래)
  const mobile = W <= 500;
  const landscape = W > 500 && H <= 500;
  const padL = mobile ? 2 : landscape ? 4 : 36;
  const padR = mobile ? 2 : landscape ? 4 : 72;
  const padT = mobile ? 4 : landscape ? 10 : 58;
  const padB = mobile ? 20 : landscape ? 26 : 120;
  const availW = W - padL - padR;
  const availH = H - padT - padB;
  const scale = Math.min(availW / (maxX - minX), availH / (maxY - minY)) * 0.90;
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const tx = padL + availW / 2 - cx * scale;
  const ty = padT + availH / 2 - cy * scale;
  svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// 빈 공간 클릭 → 핀 해제
svg.on('click', ()=>{ pinnedNode = null; onOut(); });

// ── Init ─────────────────────────────────────────────────────────────────────
render('all');
// Mobile portrait (W<=500) OR landscape-in-iframe (H<=500): always fitView
if (INITIAL_TRANSFORM && W > 500 && H > 500) {
  svg.call(zoom.transform, d3.zoomIdentity
    .translate(INITIAL_TRANSFORM.tx, INITIAL_TRANSFORM.ty)
    .scale(INITIAL_TRANSFORM.scale));
} else {
  fitView();
}
window.addEventListener('resize',()=>{
  W=innerWidth; H=innerHeight;
  svg.attr('width',W).attr('height',H);
  fitView();
});
